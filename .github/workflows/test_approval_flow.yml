name: Test Approval Flow

on:
  workflow_dispatch:

run-name: Test approval flow by @${{ github.actor }}

jobs:
  plan:
    name: Plan (dry-run)
    runs-on: ubuntu-latest
    steps:
      - name: Simulate plan output
        run: |
          echo "### Simulated Plan Output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "~ resource \"aws_s3_bucket\" \"example\" {" >> "$GITHUB_STEP_SUMMARY"
          echo "    + tags = { env = \"prod\" }" >> "$GITHUB_STEP_SUMMARY"
          echo "  }" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Plan step complete. Check the Summary tab above before approving."

  wait_for_approval:
    name: Waiting for Approval
    runs-on: ubuntu-latest
    needs: plan
    environment: test
    steps:
      - name: Approval granted
        run: echo "Approved. Proceeding with apply."

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: wait_for_approval
    steps:
      - name: Simulate apply
        run: echo "Apply complete."
